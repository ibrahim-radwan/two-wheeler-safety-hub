  <!-- Safety shield -->
  <path d="M 169 68 L 183 68 L 183 77 Q 183 84 176 87 Q 169 84 169 77 Z" fill="#ffab00" stroke="#0a1b33" stroke-width="1"/>
  <path d="M 172.8 76 L 175.2 78.6 L 179.6 73" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
